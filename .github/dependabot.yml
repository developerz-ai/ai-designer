version: 2
updates:
  # Bun — root manifest covers the whole extension.
  # MUST be `bun`, not `npm`: the npm ecosystem maintains package-lock.json /
  # yarn.lock and never touches bun.lock, so its PRs bump package.json alone and
  # every CI job then dies at `bun install --frozen-lockfile`. See PR #47.
  - package-ecosystem: bun
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    cooldown:
      default-days: 14
    groups:
      tooling:
        patterns:
          - "@biomejs/*"
          - "@types/*"
          - "typescript"
          - "wxt"
          - "@wxt-dev/*"
      vite:
        patterns:
          - "vite*"
          - "@vitejs/*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      ai-sdk:
        patterns:
          - "ai"
          - "@ai-sdk/*"
          - "@openrouter/*"
      solid:
        patterns:
          - "solid-js"
          - "@solidjs/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    cooldown:
      default-days: 14
