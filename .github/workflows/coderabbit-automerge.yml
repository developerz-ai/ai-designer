# Auto-merge a PR once CodeRabbit has formally APPROVED it AND CI is fully green.
#
# Sibling of dependabot-automerge.yml — same "merge only when green, without
# branch protection" approach: it runs in the base-repo context with write
# perms and re-verifies the full check rollup on the head SHA before merging.
#
# The gate is CodeRabbit's OWN review:
#   - CodeRabbit's latest review on the PR is APPROVED, and
#   - that approval is on the CURRENT head commit (a stale approval on an older
#     commit does not count — new commits must be re-approved), and
#   - no reviewer has an outstanding "changes requested", and
#   - the PR is mergeable and every check on the head SHA is green.
# Nothing merges unless all of the above hold. CodeRabbit issues formal
# approve/request-changes verdicts because .coderabbit.yaml sets
# reviews.request_changes_workflow: true.
#
# Triggers cover both orderings: pull_request_review (CodeRabbit approves last)
# and workflow_run on CI (CI finishes last). workflow_dispatch is a manual sweep.

name: coderabbit automerge

on:
  pull_request_review:
    types: [submitted]
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: coderabbit-automerge
  cancel-in-progress: false

jobs:
  automerge:
    name: Merge PRs CodeRabbit approved
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Merge eligible PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          owner=${REPO%/*}
          name=${REPO#*/}
          default_branch=$(gh repo view "$REPO" --json defaultBranchRef -q '.defaultBranchRef.name')

          # Open, non-draft PRs targeting the default branch.
          mapfile -t prs < <(gh pr list --repo "$REPO" --state open --base "$default_branch" \
            --json number,isDraft -q '.[] | select(.isDraft==false) | .number')

          if [ "${#prs[@]}" -eq 0 ]; then
            echo "no open PRs targeting $default_branch — nothing to do"; exit 0
          fi

          for pr in "${prs[@]}"; do
            echo "::group::PR #$pr"

            # Review state + mergeability + head SHA in one GraphQL call.
            # latestReviews = the latest review per author, so there is at most
            # one CodeRabbit entry; we read its state and the commit it reviewed.
            # shellcheck disable=SC2016  # GraphQL ($owner/$name/$number) and jq ($pr/$cr) vars are single-quoted on purpose
            read -r head_oid mergeable review_decision cr_state cr_oid < <(
              gh api graphql -f owner="$owner" -f name="$name" -F number="$pr" -f query='
                query($owner:String!,$name:String!,$number:Int!){
                  repository(owner:$owner,name:$name){
                    pullRequest(number:$number){
                      headRefOid
                      mergeable
                      reviewDecision
                      latestReviews(first:50){ nodes{ author{login} state commit{oid} } }
                    }
                  }
                }' -q '
                .data.repository.pullRequest as $pr
                | ([$pr.latestReviews.nodes[] | select(.author.login | test("^coderabbitai"; "i"))] | last) as $cr
                | [$pr.headRefOid, ($pr.mergeable // "UNKNOWN"), ($pr.reviewDecision // "NONE"), ($cr.state // "NONE"), ($cr.commit.oid // "NONE")]
                | join(" ")
              '
            )

            if [ "$cr_state" != "APPROVED" ]; then
              echo "skip: CodeRabbit review state is $cr_state (need APPROVED)"; echo "::endgroup::"; continue
            fi
            if [ "$cr_oid" != "$head_oid" ]; then
              echo "skip: CodeRabbit approval is stale (approved $cr_oid, head is $head_oid)"; echo "::endgroup::"; continue
            fi
            if [ "$review_decision" = "CHANGES_REQUESTED" ]; then
              echo "skip: a reviewer requested changes"; echo "::endgroup::"; continue
            fi
            if [ "$mergeable" != "MERGEABLE" ]; then
              echo "skip: not mergeable ($mergeable)"; echo "::endgroup::"; continue
            fi

            # Every NON-self check on the head SHA must be completed and green. This
            # workflow's own job registers as an in-progress check-run on the head SHA
            # when it runs (pull_request_review / workflow_run triggers), so counting it
            # would make the Action skip itself forever ("checks still running"). Exclude
            # it by name and gate on the remaining real checks — and require at least one
            # real check, so we never merge before CI has registered. (dependabot-
            # automerge.yml sidesteps this by only inspecting completed conclusions.)
            checks=$(gh api "repos/$REPO/commits/$head_oid/check-runs?per_page=100")
            real=$(jq -c '[.check_runs[] | select(.name != "Merge PRs CodeRabbit approved")]' <<<"$checks")
            if [ "$(jq 'length' <<<"$real")" -eq 0 ]; then
              echo "skip: no checks have run yet on $head_oid"; echo "::endgroup::"; continue
            fi
            pending=$(jq -r '.[] | select(.status != "completed") | .name' <<<"$real")
            if [ -n "$pending" ]; then
              echo "skip: checks still running:"; echo "$pending"; echo "::endgroup::"; continue
            fi
            bad=$(jq -r '.[] | select(.conclusion != null and (.conclusion | IN("success","neutral","skipped") | not)) | .name' <<<"$real")
            if [ -n "$bad" ]; then
              echo "skip: failing checks:"; echo "$bad"; echo "::endgroup::"; continue
            fi

            echo "all gates pass — CodeRabbit APPROVED $head_oid and every check is green; merging #$pr"
            gh pr merge "$pr" --repo "$REPO" --squash --delete-branch
            echo "::endgroup::"
          done
