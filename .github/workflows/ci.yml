name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.14

jobs:
  lint:
    name: Lint
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Biome
        run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Prepare WXT types
        run: bun run postinstall
      - name: Typecheck
        run: bun run typecheck

  test-unit:
    name: Test (unit)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Unit tests
        run: bun run test:unit

  test-integration:
    name: Test (integration)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Integration tests
        run: bun run test:integration

  build:
    name: Build extension
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    needs: [lint, typecheck, test-unit, test-integration]
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Build + zip (minified, tree-shaken)
        run: bun run release
      - name: Upload extension artifact
        uses: actions/upload-artifact@v7
        with:
          name: extension-zip
          path: .output/*.zip
          if-no-files-found: error
          # .output is a dotfile dir; upload-artifact skips hidden paths by default.
          include-hidden-files: true

  test-e2e:
    name: Test (e2e)
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 20
    needs: [lint, typecheck, test-unit, test-integration]
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Build extension (unpacked .output/chrome-mv3)
        run: bun run build
      # Cache the Playwright browser binaries (the big download) keyed on the
      # resolved Playwright version, so warm runs restore them instead of
      # re-downloading. `playwright install` below is then a fast verify on a
      # hit; --with-deps still ensures the OS deps each run.
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(bunx playwright --version | awk '{print $NF}')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: E2E tests
        run: bun run test:e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          include-hidden-files: true

  actionlint:
    name: actionlint
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install actionlint
        # Direct binary download. The npm-based actions run `npm install` in the
        # repo root, which fails on Bun's workspace:* protocol.
        run: bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
      - name: Run actionlint
        run: ./actionlint -color
