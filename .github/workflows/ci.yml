name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.14

jobs:
  lint:
    name: Lint
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Biome
        run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Prepare WXT types
        run: bun run postinstall
      - name: Typecheck
        run: bun run typecheck

  test-unit:
    name: Test (unit)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Unit tests
        run: bun run test:unit

  test-integration:
    name: Test (integration)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Integration tests
        run: bun run test:integration

  build:
    name: Build extension
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    needs: [lint, typecheck, test-unit, test-integration]
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Build + zip (minified, tree-shaken)
        run: bun run release
      - name: Upload extension artifact
        uses: actions/upload-artifact@v7
        with:
          name: extension-zip
          path: .output/*.zip
          if-no-files-found: error
          # .output is a dotfile dir; upload-artifact skips hidden paths by default.
          include-hidden-files: true

  test-e2e:
    name: Test (e2e)
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 20
    needs: [lint, typecheck, test-unit, test-integration]
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Build extension (unpacked .output/chrome-mv3)
        run: bun run build
      # Cache the Playwright browser binaries (the big download) keyed on the
      # resolved Playwright version, so warm runs restore them instead of
      # re-downloading. `playwright install` below is then a fast verify on a
      # hit; --with-deps still ensures the OS deps each run.
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(bunx playwright --version | awk '{print $NF}')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: E2E tests
        run: bun run test:e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          include-hidden-files: true

  site:
    # The standalone landing sub-project (site/) is self-contained and NOT covered
    # by the jobs above: root `bun run lint` excludes **/site and root typecheck is
    # the extension's tsc. Gate site/ on its own lint/typecheck/build here, and pin
    # the hCaptcha fail-closed guard so a future weakening can't silently reship the
    # always-pass test key (#128).
    name: Site (landing)
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/bun-setup
        with:
          bun-version: ${{ env.BUN_VERSION }}
          # site/ has its own package.json + bun.lock; skip the root install.
          install: 'false'
      - name: Install site deps
        working-directory: site
        run: bun install --frozen-lockfile
      - name: Lint
        working-directory: site
        run: bun run lint
      - name: Typecheck
        working-directory: site
        run: bun run typecheck
      - name: Build (no key -> allowed, mirrors a local build)
        working-directory: site
        run: bun run build
      - name: hCaptcha guard fails closed (#128 regression pin)
        working-directory: site
        run: |
          # The build MUST abort when VITE_HCAPTCHA_SITEKEY is defined-but-empty or the
          # always-pass test key (site/vite.config.ts hcaptcha-key-guard). If a future
          # change weakens the guard, one of these builds succeeds and this job fails.
          if VITE_HCAPTCHA_SITEKEY="" bun run build; then
            echo "::error::hcaptcha-key-guard did not abort on an empty VITE_HCAPTCHA_SITEKEY (fail-open regression, #128)"
            exit 1
          fi
          if VITE_HCAPTCHA_SITEKEY="10000000-ffff-ffff-ffff-000000000001" bun run build; then
            echo "::error::hcaptcha-key-guard did not abort on the hCaptcha test key (fail-open regression, #128)"
            exit 1
          fi
          echo "hcaptcha-key-guard correctly aborts empty and test-key builds"

  actionlint:
    name: actionlint
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install actionlint
        # Direct binary download. The npm-based actions run `npm install` in the
        # repo root, which fails on Bun's workspace:* protocol.
        run: bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
      - name: Run actionlint
        run: ./actionlint -color
