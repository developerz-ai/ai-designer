# Auto-merge Dependabot PRs once CI is fully green.
#
# Uses `workflow_run` (fires after CI completes on the PR head SHA) so the job
# runs in the base-repo context with write perms — Dependabot-triggered
# `pull_request` runs only get a read-only token. Re-verifies the full check
# rollup before merging, so it's "merge only if green" without branch protection.

name: dependabot automerge

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Merge if every check on the head SHA is green
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          pr=$(gh pr list --repo "$REPO" --author "app/dependabot" --state open \
            --json number,headRefOid -q ".[] | select(.headRefOid == \"$HEAD_SHA\") | .number")
          if [ -z "$pr" ]; then
            echo "no open dependabot PR for $HEAD_SHA — nothing to do"; exit 0
          fi
          bad=$(gh api "repos/$REPO/commits/$HEAD_SHA/check-runs" --paginate \
            -q '.check_runs[] | select(.conclusion != null and (.conclusion | IN("success","neutral","skipped") | not)) | .name')
          if [ -n "$bad" ]; then
            echo "not merging — failing checks:"; echo "$bad"; exit 0
          fi
          gh pr merge "$pr" --repo "$REPO" --squash --delete-branch
          echo "merged #$pr"
