# Localization source — default locale (en). @wxt-dev/i18n generates the browser
# _locales/ files and the typed `#i18n` module from this file at `wxt prepare` /
# build time. Top-level flat keys back the manifest __MSG_*__ substitutions; nested
# groups back the side-panel UI, accessed via i18n.t('group.key').
#
# Substitutions: named {placeholder} → i18n.t('k', { placeholder: v }); positional
# $1 → i18n.t('k', [v]). Plurals: { 1: 'one', n: '$1 many' } → i18n.t('k', count).
# Data renders (model/tool names, user content, dates, enum values) stay in code —
# they are not translatable copy.

# ─── Manifest (flat top-level keys, referenced as __MSG_<key>__ in wxt.config.ts) ──
