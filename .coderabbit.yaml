# CodeRabbit config for Developerz.ai Designer (Chrome MV3 · Bun + TS + WXT + SolidJS).
# Schema: https://coderabbit.ai/integrations/schema.v2.json

language: "en-US"
tone_instructions: "Be chill, helpful, focus on meaningful improvements. Skip nitpicks. This is an MV3 extension: flag any change that puts secrets (OpenRouter key, MCP tokens) in a content script / page world, executes remote code, or persists live-page edits to a server as blocking. Live edits must stay ephemeral; shipping happens only via an explicit MCP handoff."
early_access: true

reviews:
  profile: "chill"
  request_changes_workflow: true
  high_level_summary: true
  estimate_code_review_effort: true
  collapse_walkthrough: true
  sequence_diagrams: true
  poem: false
  suggested_labels: true
  auto_apply_labels: true
  suggested_reviewers: true
  auto_assign_reviewers: false

  path_filters:
    - "!**/node_modules/**"
    - "!**/.output/**"
    - "!**/.wxt/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/coverage/**"
    - "!**/*.tsbuildinfo"
    - "!**/bun.lock"
    - "!**/package-lock.json"

  path_instructions:
    - path: "src/entrypoints/background.ts"
      instructions: |
        - Service worker. The ONLY place the OpenRouter key and MCP tokens may live.
        - Ephemeral — never assume in-memory state survives. Persist in-flight state to chrome.storage.session and rehydrate.
        - All page access is proxied to the content script via the typed message bus. No direct DOM here (there is none).

    - path: "src/entrypoints/content.ts"
      instructions: |
        - Runs in the page's world. NEVER read/store the OpenRouter key or MCP tokens here.
        - DOM mutations must be reversible and recorded to the changeset. No inline style writes that can't be undone.
        - Prefer stable selectors (data-attrs, roles, text); flag brittle nth-child chains.

    - path: "src/agent/**"
      instructions: |
        - Vercel AI SDK loop. Policy lives in prompts + tools, not hardcoded state machines.
        - Never regex on model output to detect "intent". Never auto-trigger handoff — shipping is an explicit user action.

    - path: "src/dom/**"
      instructions: |
        - Pure, testable DOM/selector logic. Flag hidden global state.

    - path: "src/changeset/**"
      instructions: |
        - Changeset is the durable output. Zod schema is the source of truth.
        - Every recorded edit must carry intent + stable selector + before/after. Flag lossy captures.

    - path: "src/mcp/**"
      instructions: |
        - MCP clients live in the service worker only. Tokens never cross into page/content world.
        - Handoff dispatches a task; it does not write to the user's repo directly.

    - path: "src/**/*.tsx"
      instructions: |
        - SolidJS, one component per file with co-located .scss (SRP). Files >150 LOC must be split.
        - No remote code / eval — the bundle must stay CSP-clean for MV3.

    - path: ".github/workflows/**"
      instructions: |
        - Runners must be blacksmith-2vcpu-ubuntu-2404 unless a job genuinely needs more.
        - Pin third-party actions by tag.

    - path: "test/integration/**"
      instructions: |
        - Mocking the LLM is allowed (deterministic agent-loop tests), but the DOM-tool contract and changeset assembly must run for real (jsdom).

  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords:
      - "WIP"
      - "DO NOT REVIEW"
      - "DRAFT"
    drafts: false

  pre_merge_checks:
    pull_request:
      title:
        enabled: true
        min_length: 10
      description:
        enabled: true
        min_length: 50

  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false

  tools:
    biome:
      enabled: true
    actionlint:
      enabled: true
    shellcheck:
      enabled: true
    semgrep:
      enabled: true
    gitleaks:
      enabled: true

chat:
  art: false
  auto_reply: true

knowledge_base:
  opt_out: false
  learnings:
    scope: "auto"
  code_guidelines:
    enabled: true
    files:
      - "CLAUDE.md"
      - "docs/idea/principles.md"
      - "docs/idea/ai-first.md"
      - "docs/architecture/**"
