# developerz.ai Designer landing — production static server (unprivileged
# nginx, :8080). Serves the Vite static bundle. IPv4 listen only: pods are
# reached on their IPv4 address and the base image does not enable IPv6.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Content-hashed build assets are immutable — cache them hard.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Unknown routes fall back to the page shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
